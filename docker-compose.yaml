services:
  mysql:
    image: mysql:8.4
    container_name: bfstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-bfstore_root_password}
    ports:
      - "3306:3306"
    volumes:
      - bfstore_mysql_data:/var/lib/mysql
      - ./db/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bfstore

  kafka:
    image: apache/kafka:4.1.2
    container_name: bfstore-kafka
    restart: unless-stopped
    environment:
      # KRaft single-node local development broker.
      #
      # This is suitable for local bfstore development only.
      # Production Kafka should be deployed and operated with a proper
      # multi-broker design, persistence strategy, security configuration,
      # monitoring, backups, and upgrade process.

      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "29092:29092"
    volumes:
      - bfstore_kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - bfstore

  kafka-init:
    image: apache/kafka:4.1.2
    container_name: bfstore-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -euo pipefail

        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic bfstore.order.orders.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic bfstore.inventory.stock.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic bfstore.payment.payments.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic bfstore.shipping.shipments.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic bfstore.notification.notifications.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic bfstore.catalog.products.v1 --partitions 3 --replication-factor 1

        echo "bfstore Kafka topics created."
    networks:
      - bfstore

 
  catalog-service:
     build:
       context: .
       dockerfile: services/catalog-service/Dockerfile
     container_name: bfstore-catalog-service
     depends_on:
       mysql:
         condition: service_healthy
       kafka:
         condition: service_healthy
     environment:
       ENVIRONMENT: ${ENVIRONMENT:-local}
       LOG_LEVEL: ${LOG_LEVEL:-debug}
       MYSQL_HOST: mysql
       MYSQL_PORT: 3306
       MYSQL_DATABASE: ${CATALOG_DB_NAME:-bfstore_catalog}
       MYSQL_USER: ${CATALOG_DB_USER:-bfstore_catalog_user}
       MYSQL_PASSWORD: ${CATALOG_DB_PASSWORD:-bfstore_catalog_password}
       KAFKA_BOOTSTRAP_SERVERS: kafka:9092
       CATALOG_SERVICE_GRPC_PORT: ${CATALOG_SERVICE_GRPC_PORT:-50051}
     ports:
       - "${CATALOG_SERVICE_GRPC_PORT:-50051}:50051"
     networks:
       - bfstore

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/local/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    networks:
      - bfstore
    restart: unless-stopped
    depends_on:
      - jaeger
    
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: bfstore-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks:
      - bfstore

  prometheus:
    image: prom/prometheus:latest
    container_name: bfstore-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
    volumes:
      - ./deploy/local/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - bfstore-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - bfstore
    depends_on:
      - otel-collector
    
  grafana:
    image: grafana/grafana:latest
    container_name: bfstore-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - bfstore-grafana-data:/var/lib/grafana
      - ./deploy/local/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - bfstore-local

networks:
  bfstore:
    name: bfstore
    driver: bridge

volumes:
  bfstore_mysql_data:
  bfstore_kafka_data:
  bfstore-prometheus-data:
  bfstore-grafana-data:
