# Order Events Protobuf Package

## Package

```proto
package acme.order.events.v1;
```

## Purpose

This package defines Kafka event payloads published by the bfstore Order Service.

Order events are facts that have already happened.

Examples:

```text
OrderCreated
OrderFailed
OrderCancelled
OrderCompleted
```

Events are serialised with Protocol Buffers and published to Kafka.

---

## Field Presence Convention

bfstore uses proto3.

For event facts, prefer plain scalar fields for values that should always be part of the event.

Use `optional` only where a field is genuinely nullable, conditional, or contextual.

Good optional candidates:

```text
failure_message
discount_code
customer_id for guest checkout
promotion_id
external_reference
```

Avoid using `optional` for core event facts that consumers should always receive.

---

## Recommended OrderCreated Pattern

```proto
message OrderCreatedEvent {
  acme.events.v1.EventMetadata metadata = 1;
  OrderCreated data = 2;
}

message OrderCreated {
  string order_id = 1;
  string customer_id = 2;
  repeated OrderItemSnapshot items = 3;
  acme.common.v1.Money total = 4;
}
```

These fields are core facts of the event and should be populated by the producer.

If bfstore supports guest checkout later, `customer_id` may become optional or be replaced with a richer customer/contact message.

---

## Recommended OrderFailed Pattern

```proto
message OrderFailedEvent {
  acme.events.v1.EventMetadata metadata = 1;
  OrderFailed data = 2;
}

message OrderFailed {
  string order_id = 1;
  OrderFailureReason reason = 2;
  optional string failure_message = 3;
}
```

`failure_message` is optional because:

```text
not every failure has a safe human-readable message
some failures should expose only a machine-readable reason
some details may be sensitive or internal
```

---

## Failure Reasons

Enums should include an explicit zero value.

Example:

```proto
enum OrderFailureReason {
  ORDER_FAILURE_REASON_UNSPECIFIED = 0;
  ORDER_FAILURE_REASON_STOCK_RESERVATION_FAILED = 1;
  ORDER_FAILURE_REASON_PAYMENT_AUTHORISATION_FAILED = 2;
  ORDER_FAILURE_REASON_SHIPPING_CREATION_FAILED = 3;
}
```

Do not treat the zero value as a valid business state.

Services should validate that published failure events contain a meaningful non-zero reason.

---

## Optional Fields and Consumers

Consumers must handle optional fields defensively.

For example:

```text
Notification Service may use failure_message if present
Analytics may group by reason regardless of failure_message
Support tooling may show a fallback message when failure_message is absent
```

Do not design consumers that require optional detail fields to be present.

---

## Validation

Order Service must validate event payloads before publishing.

Examples:

```text
order_id must be present
metadata must be present and valid
OrderCreated must include at least one item
OrderCreated total must be valid
OrderFailed reason must be non-zero
failure_message must not include sensitive internal details
```

---

## Compatibility

Follow Protobuf compatibility rules:

```text
never reuse field numbers
reserve removed field numbers
reserve removed field names
add fields compatibly
use new event versions for breaking semantic changes
```

Optional fields are useful for compatible additions when consumers can safely ignore them.
