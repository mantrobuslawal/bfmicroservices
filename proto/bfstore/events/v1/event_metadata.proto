# Event Metadata Protobuf Package

## Package

```proto
package acme.events.v1;
```

## Purpose

This package contains shared event metadata used by bfstore Kafka event payloads.

bfstore serialises Kafka event payloads with Protocol Buffers.

The metadata message should support:

```text
event identity
event type and version
producer identity
aggregate subject
correlation and causation context
distributed tracing context
idempotency context
```

---

## Field Presence Convention

bfstore uses proto3.

Use plain scalar fields for metadata that every valid event must contain.

Use `optional` for scalar context fields that may not always be available.

---

## Recommended EventMetadata Shape

```proto
message EventMetadata {
  string event_id = 1;
  string event_type = 2;
  string event_version = 3;
  google.protobuf.Timestamp occurred_at = 4;
  string producer = 5;
  string subject = 6;

  optional string correlation_id = 7;
  optional string causation_id = 8;
  optional string trace_id = 9;
  optional string idempotency_key = 10;
}
```

Required-by-validation fields:

```text
event_id
event_type
event_version
occurred_at
producer
subject
```

Optional context fields:

```text
correlation_id
causation_id
trace_id
idempotency_key
```

---

## Why Optional Context Fields?

Some producers may not always have all context values.

For example:

```text
a scheduled job may not have an inbound correlation_id
a backfill process may not have a causation_id
a legacy integration may not provide trace context
some events may not come from an idempotent command
```

Using `optional` allows consumers to distinguish between:

```text
context field absent
context field present but empty
context field present with value
```

Services should generally avoid publishing present-but-empty context fields.

---

## Kafka Headers and Metadata

Kafka headers may also carry operational metadata such as:

```text
event_type
event_version
correlation_id
traceparent
content_type
```

The Protobuf event payload should still include durable business/event metadata.

Kafka headers are useful for routing, tracing, and middleware.

The Protobuf payload is the durable event contract.

---

## Validation

Event producers must validate metadata before writing to the outbox or publishing to Kafka.

Examples:

```text
event_id must be globally unique
event_type must match the Protobuf event type
event_version must be supported
occurred_at must be set
producer must identify the publishing service
subject should identify the aggregate or business entity
```

Consumers should treat missing required metadata as a contract violation.

---

## Compatibility

Follow Protobuf compatibility rules:

```text
never reuse field numbers
reserve removed field numbers
reserve removed field names
add new fields compatibly
use new event versions or topics for breaking semantic changes
```

Optional context fields may be added compatibly when older consumers can safely ignore them.
